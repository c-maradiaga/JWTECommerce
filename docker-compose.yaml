services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwtecommerce-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=JWTECommerce;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
    networks:
      - coolify
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tuapp-api.rule=Host(`api.getfintech.online`)"
      - "traefik.http.routers.tuapp-api.entrypoints=https"
      - "traefik.http.routers.tuapp-api.tls=true"
      - "traefik.http.routers.tuapp-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.tuapp-api.loadbalancer.server.port=8080"
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tuapp-sqlserver
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - internal
    # Nota: sin "ports:" — no se expone al público, solo la API la alcanza internamente

networks:
  coolify:
    external: true
  internal:
    driver: bridge

volumes:
  sqlserver_data:

    ##* PUNTOS CLAVE:
    #? 1. La API se expone públicamente a través de Traefik, mientras que SQL Server solo es accesible internamente.
    #? 2. La contraseña de SQL Server se gestiona mediante la variable de entorno SA_PASSWORD    
    #? 3. loadbalancer.server.port=8080 → este es el puerto interno en que Kestrel escucha dentro del contenedor 
    #    (por defecto en .NET 8+ es 8080 para HTTP cuando corre en contenedor Linux — lo confirmamos en el Paso 3).
    #? 4. La red internal (privada, solo entre tu API y tu SQL Server) es distinta de coolify (donde vive Traefik) — 
    #    así el SQL Server nunca es alcanzable desde fuera, ni siquiera por Traefik
    #? 5. El networks: external: true en coolify le dice a Docker Compose "esta red ya existe, no la crees, solo únete a ella".




    # volumes:
    #   jwt_ecommerce:

    #? Recordar tener Docker instalado y en ejecución para usar este archivo docker-compose.yaml.
    #? en el apartdo ports: 1434:1433, el puerto 1434 es el puerto del host (nuestro equipo) y el puerto 1433 es el puerto del contenedor (sqlserver2022). Esto significa que cuando accedamos a localhost:1434 en nuestro equipo, estaremos accediendo al puerto 1433 dentro del contenedor, donde se está ejecutando SQL Server.

    #* Comandos útiles:

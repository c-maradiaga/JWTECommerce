services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-db
    # Asignamos usuario root (0) para solucionar el error "Access is denied" en los volúmenes
    user: "0:0"
    platform: linux/amd64
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1434:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '$SA_PASSWORD' -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=JWTECommerceDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:

    ##* PUNTOS CLAVE:
    #? 1. La API se expone públicamente a través de Traefik, mientras que SQL Server solo es accesible internamente.
    #? 2. La contraseña de SQL Server se gestiona mediante la variable de entorno SA_PASSWORD    
    #? 3. loadbalancer.server.port=8080 → este es el puerto interno en que Kestrel escucha dentro del contenedor 
    #    (por defecto en .NET 8+ es 8080 para HTTP cuando corre en contenedor Linux — lo confirmamos en el Paso 3).
    #? 4. La red internal (privada, solo entre tu API y tu SQL Server) es distinta de coolify (donde vive Traefik) — 
    #    así el SQL Server nunca es alcanzable desde fuera, ni siquiera por Traefik
    #? 5. El networks: external: true en coolify le dice a Docker Compose "esta red ya existe, no la crees, solo únete a ella".

